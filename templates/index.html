<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stoppuhr</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 50px;
    padding: 0 10px;
    background-color: #f9f9f9;
}

button {
    font-size: 24px;
    margin: 8px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background-color: #007BFF;
    color: white;
}

button:active {
    background-color: #0056b3;
}

#timer {
    font-size: 80px;
    margin: 20px 0;
}

#laps {
    margin-top: 20px;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
    text-align: left;
}

#laps p {
    font-size: 22px;
    margin: 4px 0;
    padding: 4px 8px;
    background-color: #e0e0e0;
    border-radius: 5px;
}
</style>
</head>
<body>
<h1>Stoppuhr</h1>
<div id="timer">0.00</div>

<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="lapTimer()">Lap</button>
<button onclick="resetTimer()">Reset</button>

<div id="laps"></div>

<script>
let timerInterval = null;
let startTime = null;
let elapsed = 0;

function updateTimer() {
    document.getElementById("timer").innerText = elapsed.toFixed(2);
}

function startTimer() {
    if (!timerInterval) {
        startTime = Date.now() - elapsed*1000;
        timerInterval = setInterval(() => {
            elapsed = (Date.now() - startTime)/1000;
            updateTimer();
        }, 10); // Update alle 10ms für Hundertstel
    }
    fetch('/start', {method: 'POST'});
}

function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    fetch('/stop', {method: 'POST'});
}

function lapTimer() {
    fetch('/lap', {method: 'POST'})
        .then(res => res.json())
        .then(data => {
            const lapDiv = document.getElementById("laps");
            const p = document.createElement("p");
            p.innerText = `Lap ${data.lap_number}: ${elapsed.toFixed(2)} s`;
            lapDiv.appendChild(p);
        });
}

function resetTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    elapsed = 0;
    updateTimer();
    startTime = null;
    document.getElementById("laps").innerHTML = '';
    fetch('/reset', {method: 'POST'});
}
</script>
</body>
</html>
